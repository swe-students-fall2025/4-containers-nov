name: ML Client CI

on:
  push:
    paths:
      - "machine-learning-client/**"
      - ".github/workflows/ml-client-ci.yml"

jobs:
  test-ml-client:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: machine-learning-client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install pipenv
        run: pip install --upgrade pip pipenv

      - name: Install dependencies
        run: pipenv install --dev

      - name: Run black
        run: pipenv run black . --check

      - name: Run pylint
        run: pipenv run pylint src tests --disable=R0903

      - name: Run pytest
        run: pipenv run pytest --cov=src --cov-report=term-missing
